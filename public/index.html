<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DesignMD — 设计语言提取器</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0a0f;--surface:#15151c;--surface2:#1a1a22;--surface3:#1e1e26;
      --border:#2a2a33;--border2:#1a1a20;--text:#fafafa;--text2:#e4e4e7;
      --text3:#a1a1aa;--muted:#71717a;--muted2:#52525b;--muted3:#3f3f46;
      --primary:#a78bfa;--primary2:#7C5CFC;--primary-hover:#8b6aff;
      --primary-dim:rgba(167,139,250,0.12);--primary-glow:rgba(124,92,252,0.25);
      --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#5CAAFC;
      --cyan:#06b6d4;--pink:#ec4899;--purple:#a855f7;--orange:#f97316;
      --mono:'JetBrains Mono',ui-monospace,monospace;
      --sans:'Inter','Noto Sans SC',-apple-system,sans-serif;
      --radius:12px;
    }
    html,body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
    body{display:flex;flex-direction:column;overflow:hidden;height:100vh}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,textarea{font-family:inherit;color:inherit}

    .nav{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;flex-shrink:0;border-bottom:1px solid var(--border2)}
    .logo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
    .logo svg{color:var(--primary)}
    .logo-text{font-size:16px;font-weight:600;color:var(--text)}
    .nav-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
    .nav-spacer{flex:1}
    .nav-link{font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:color .15s}
    .nav-link:hover{color:var(--text)}
    .nav-link.active{color:var(--primary)}
    .nav-btn{display:flex;align-items:center;gap:5px;height:32px;padding:0 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;color:var(--text3);transition:all .15s}
    .nav-btn:hover{border-color:var(--muted)}

    .main{flex:1;overflow:hidden;display:flex;flex-direction:column}
    .view{display:none;flex:1;overflow:hidden;flex-direction:column;width:100%}
    .view.active{display:flex}

    /* Home View */
    #homeView{align-items:center;justify-content:flex-start;padding:60px 32px 40px 32px;gap:28px;overflow-y:auto}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;height:26px;background:var(--primary-dim);border:1px solid rgba(167,139,250,0.25);border-radius:20px;padding:0 12px;flex-shrink:0}
    .hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--primary)}
    .hero-badge span{font-size:11px;font-weight:500;color:#c4b5fd}
    .hero-title{text-align:center;font-size:52px;font-weight:600;letter-spacing:-1.5px;line-height:1.1;flex-shrink:0}
    .hero-title .accent{color:var(--primary);display:block}
    .hero-sub{max-width:680px;font-size:14px;color:var(--text3);text-align:center;line-height:1.6}
    .prompt-box{width:100%;max-width:720px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:0 20px 60px -20px var(--primary-glow),0 8px 24px rgba(0,0,0,0.4);flex-shrink:0}
    .prompt-input{width:100%;background:none;border:none;outline:none;resize:none;font-size:15px;line-height:1.5;color:var(--text);min-height:48px;font-family:var(--sans)}
    .prompt-input::placeholder{color:var(--muted2)}
    .prompt-bottom{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .prompt-tool{display:flex;align-items:center;gap:5px;height:30px;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:0 10px;font-size:11px;font-weight:500;color:var(--text3);transition:all .15s}
    .prompt-tool:hover{border-color:var(--muted);color:var(--text2)}
    .prompt-tool svg{color:var(--text3)}
    .prompt-bottom-spacer{flex:1;min-width:0}
    .prompt-gen{display:flex;align-items:center;gap:5px;height:34px;padding:0 16px;background:var(--primary2);color:#fff;border-radius:8px;font-size:13px;font-weight:600;transition:background .15s;flex-shrink:0}
    .prompt-gen:hover{background:var(--primary-hover)}
    .prompt-gen:disabled{opacity:.5;cursor:not-allowed}
    .prompt-gen.loading svg{animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .suggestions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .sug-chip{display:flex;align-items:center;gap:6px;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:0 14px;font-size:11px;color:var(--text2);transition:all .15s}
    .sug-chip:hover{border-color:var(--primary);color:var(--primary)}

    /* Gallery View */
    #galleryView{flex-direction:row}
    .gal-side{width:220px;flex-shrink:0;padding:20px 16px 20px 20px;border-right:1px solid var(--border2);display:flex;flex-direction:column;gap:4px;overflow-y:auto}
    .gal-side-label{font-size:10px;font-weight:600;font-family:var(--mono);color:var(--muted2);letter-spacing:1px;margin-bottom:8px}
    .gal-cat{display:flex;align-items:center;gap:8px;height:32px;border-radius:7px;padding:0 10px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s}
    .gal-cat:hover{background:var(--surface)}
    .gal-cat.active{background:var(--primary-dim);color:var(--text)}
    .gal-cat.active svg{color:var(--primary)}
    .gal-cat svg{color:var(--muted);flex-shrink:0}
    .gal-cat span:first-of-type{flex:1}
    .gal-cat-count{font-size:10px;font-family:var(--mono);color:var(--muted2)}
    .gal-main{flex:1;padding:24px 32px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
    .gal-header h2{font-size:22px;font-weight:600;letter-spacing:-0.4px;margin-bottom:4px}
    .gal-header p{font-size:12px;color:var(--muted)}
    .gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .tpl-card{display:flex;flex-direction:column;gap:10px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s}
    .tpl-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,92,252,0.2)}
    .tpl-card-head{display:flex;align-items:center;justify-content:space-between}
    .tpl-card-cat{font-size:9px;font-weight:600;font-family:var(--mono);color:var(--primary);letter-spacing:0.8px;text-transform:uppercase}
    .tpl-card-swatches{display:flex;gap:3px}
    .tpl-card-swatch{width:14px;height:14px;border-radius:3px}
    .tpl-card-swatch.light{border:1px solid var(--border)}
    .tpl-card-name{font-size:14px;font-weight:600;color:var(--text)}
    .tpl-card-desc{font-size:11px;color:var(--muted)}

    /* Editor View */
    #editorView{flex-direction:column}
    .editor-top{display:flex;align-items:center;gap:12px;padding:0 16px;height:52px;border-bottom:1px solid var(--border2);flex-shrink:0}
    .editor-bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
    .editor-bc svg{cursor:pointer;color:var(--muted)}
    .editor-bc span{cursor:pointer}
    .editor-bc .bc-current{color:var(--text);font-weight:600;cursor:default;display:flex;align-items:center;gap:5px}
    .editor-bc .bc-dot{width:8px;height:8px;border-radius:2px;background:var(--primary2);display:inline-block}
    .editor-canvas{flex:1;overflow:auto;position:relative;background:var(--bg);background-image:radial-gradient(circle,var(--surface) 1px,transparent 1px);background-size:24px 24px}
    .canvas-inner{position:relative;width:1480px;min-height:1000px;padding:24px}
    .sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,0.3);transition:border-color .2s}
    .sec-card:hover{border-color:var(--muted3)}
    .sec-header{display:flex;align-items:center;gap:6px}
    .sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .sec-title{font-size:13px;font-weight:600;color:var(--text)}
    .sec-header-spacer{flex:1}
    .sec-edit{color:var(--muted2);cursor:pointer;transition:color .15s;display:flex}
    .sec-edit:hover{color:var(--text3)}
    .sec-desc{font-size:12px;line-height:1.5;color:var(--text3)}
    .sec-tags{display:flex;gap:5px;flex-wrap:wrap}
    .sec-tag{padding:2px 8px;font-size:9px;font-weight:500;background:var(--primary-dim);color:#c4b5fd;border-radius:4px}

    @media (min-width:769px){
      .sec-card{position:absolute}
      .sec-card[data-sec="1"]{width:300px;left:24px;top:24px}
      .sec-card[data-sec="2"]{width:360px;left:360px;top:24px}
      .sec-card[data-sec="3"]{width:320px;left:756px;top:24px}
      .sec-card[data-sec="4"]{width:300px;left:1100px;top:24px}
      .sec-card[data-sec="5"]{width:280px;left:24px;top:340px}
      .sec-card[data-sec="6"]{width:340px;left:336px;top:340px}
      .sec-card[data-sec="8"]{width:300px;left:708px;top:340px}
      .sec-card[data-sec="7"]{width:320px;left:1044px;top:340px}
      .sec-card[data-sec="9"]{width:440px;left:24px;top:640px}
    }

    .canvas-chat{position:fixed;bottom:20px;left:20px;width:380px;max-width:calc(100vw - 40px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;box-shadow:0 20px 40px -10px rgba(124,92,252,0.35),0 0 0 1px rgba(167,139,250,0.1);z-index:50}
    .canvas-chat-head{display:flex;align-items:center;gap:6px}
    .canvas-chat-head svg{color:var(--primary)}
    .canvas-chat-title{font-size:11px;font-weight:600;color:var(--text);flex:1}
    .canvas-chat-kbd{display:flex;align-items:center;height:18px;padding:0 6px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;font-size:9px;font-family:var(--mono);color:var(--muted)}
    .canvas-chat-input{width:100%;background:none;border:none;outline:none;font-size:12px;color:var(--text);font-family:var(--sans)}
    .canvas-chat-input::placeholder{color:var(--muted2)}

    .swatch-header{display:flex;align-items:center;justify-content:space-between}
    .swatch-add{font-size:10px;font-weight:500;color:var(--muted);cursor:pointer}
    .swatch-grid{display:flex;gap:8px}
    .swatch-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
    .swatch-color{width:100%;height:44px;border-radius:6px;cursor:pointer;transition:transform .12s}
    .swatch-color:hover{transform:scale(1.05)}
    .swatch-color.light{border:1px solid var(--border)}
    .swatch-name{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .typo-sample{display:flex;flex-direction:column;gap:2px}
    .typo-meta{font-size:9px;font-family:var(--mono);color:var(--muted2)}
    .comp-btns{display:flex;gap:8px;flex-wrap:wrap}
    .comp-btn-primary{padding:8px 14px;border-radius:4px;font-size:12px;color:#fff;cursor:default}
    .comp-btn-ghost{padding:8px 14px;border-radius:4px;font-size:12px;background:transparent;cursor:default}
    .comp-card-preview{padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;gap:4px}
    .comp-card-preview .ct{font-size:13px;font-weight:300;color:var(--text2)}
    .comp-card-preview .cd{font-size:10px;color:var(--muted)}
    .spacing-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
    .sp-item{display:flex;flex-direction:column;align-items:center;gap:3px}
    .sp-box{background:var(--primary);border-radius:2px;opacity:.6}
    .sp-label{font-size:9px;font-family:var(--mono);color:var(--muted2)}
    .depth-row{display:flex;gap:10px}
    .depth-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
    .depth-box{width:100%;height:44px;background:var(--surface3);border-radius:6px}
    .depth-label{font-size:9px;font-family:var(--mono);color:var(--muted2)}
    .resp-row{display:flex;gap:8px}
    .resp-item{flex:1;padding:10px 8px;background:var(--surface3);border-radius:7px;display:flex;flex-direction:column;align-items:center;gap:4px}
    .resp-item svg{color:var(--purple)}
    .resp-name{font-size:10px;font-weight:500;color:var(--text2)}
    .resp-size{font-size:8px;font-family:var(--mono);color:var(--muted2)}
    .dd-wrap{display:flex;flex-direction:column;gap:8px}
    .dd-box{padding:10px;border-radius:6px;display:flex;flex-direction:column;gap:4px}
    .dd-do{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15)}
    .dd-dont{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15)}
    .dd-title{font-size:10px;font-weight:600;margin-bottom:2px}
    .dd-do .dd-title{color:var(--green)}
    .dd-dont .dd-title{color:var(--red)}
    .dd-box div:not(.dd-title){font-size:10px;line-height:1.5}
    .dd-do div:not(.dd-title){color:#4ade80}
    .dd-dont div:not(.dd-title){color:#f87171}
    .agent-refs{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--text2)}
    .agent-refs code{font-size:10px;background:var(--bg);padding:1px 4px;border-radius:3px;font-family:var(--mono)}
    .agent-code{padding:12px;background:var(--bg);border-radius:6px;font-size:10px;font-family:var(--mono);color:var(--text3);line-height:1.7;display:flex;flex-direction:column;gap:2px;margin-top:8px}

    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:40px}
    .empty-state svg{opacity:.2}
    .empty-state p{font-size:13px}

    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);color:var(--text);padding:10px 18px;border-radius:10px;font-size:12px;border:1px solid var(--border);opacity:0;transition:all .25s;pointer-events:none;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media (max-width:768px){
      .nav{padding:0 16px;height:52px;gap:10px}
      .logo-text{font-size:15px}
      .nav-link{display:none}
      .nav-sep{display:none}

      #homeView{padding:32px 20px 24px 20px;gap:20px}
      .hero-badge{height:24px;padding:0 10px}
      .hero-badge span{font-size:10px}
      .hero-title{font-size:30px;letter-spacing:-0.8px}
      .hero-sub{font-size:13px;max-width:300px}
      .prompt-box{padding:14px;gap:10px}
      .prompt-input{font-size:14px;min-height:44px}
      .prompt-tool{height:28px;padding:0 8px}
      .prompt-tool span{display:none}
      .prompt-gen{height:32px;padding:0 14px;font-size:12px}
      .sug-chip{height:28px;padding:0 12px;font-size:10px}

      #galleryView{flex-direction:column}
      .gal-side{width:100%;height:auto;flex-shrink:0;padding:10px 16px;border-right:none;border-bottom:1px solid var(--border2);flex-direction:row;gap:6px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
      .gal-side::-webkit-scrollbar{display:none}
      .gal-side-label{display:none}
      .gal-cat{flex-shrink:0;height:28px;padding:0 12px;border-radius:20px;border:1px solid var(--border);font-size:11px}
      .gal-cat svg{display:none}
      .gal-cat-count{display:none}
      .gal-cat span:first-of-type{flex:none}
      .gal-main{padding:16px}
      .gal-header h2{font-size:18px}
      .gal-grid{grid-template-columns:repeat(2,1fr);gap:10px}
      .tpl-card{padding:14px;gap:8px}
      .tpl-card-swatch{width:12px;height:12px}
      .tpl-card-name{font-size:13px}
      .tpl-card-desc{font-size:10px}

      #editorView{flex-direction:column}
      .editor-top{padding:0 16px;height:52px}
      .editor-canvas{background:var(--bg);overflow-y:auto;overflow-x:hidden;background-image:none}
      .canvas-inner{width:100%;padding:16px 16px 80px 16px;display:flex;flex-direction:column;gap:12px;min-height:auto}
      .sec-card{position:static!important;width:100%!important;left:auto!important;top:auto!important;padding:14px;gap:10px}
      .sec-title{font-size:12px}
      .sec-desc{font-size:11px}
      .canvas-chat{position:fixed;bottom:0;left:0;width:100%;max-width:none;border-radius:0;border-left:none;border-right:none;border-bottom:none;box-shadow:0 -8px 24px rgba(0,0,0,0.5);padding:10px 16px}
      .canvas-chat-title{display:none}
      .canvas-chat-kbd{display:none}
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="logo" onclick="showView('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="15.5" r="2.5"/><circle cx="8.5" cy="15.5" r="2.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/></svg>
      <span class="logo-text">DesignMD</span>
    </div>
    <div class="nav-sep"></div>
    <div class="nav-link" data-view="home" onclick="showView('home')">首页</div>
    <div class="nav-link" data-view="gallery" onclick="showView('gallery')">模版库</div>
    <div class="nav-spacer"></div>
    <button class="nav-btn" onclick="window.open('https://github.com/rrrrrrou0622/design-md-tool','_blank')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.17c-3.34.73-4.04-1.6-4.04-1.6-.54-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.21.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
      <span>Star</span>
    </button>
  </nav>

  <div class="main">

    <div class="view active" id="homeView">
      <div class="hero-badge"><div class="hero-badge-dot"></div><span>基于 Google Stitch DESIGN.md 标准</span></div>
      <h1 class="hero-title">把任何网站的设计语言<span class="accent">变成 AI 能读懂的文件</span></h1>
      <p class="hero-sub">粘贴网址 · 选择模版 · 直接描述。AI 生成完整 DESIGN.md，Claude Code / Cursor 里直接用。</p>
      <div class="prompt-box">
        <div id="imgPreview" style="display:none;position:relative;width:100%;max-height:240px;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
          <img id="imgPreviewEl" style="width:100%;max-height:240px;object-fit:contain;display:block;background:#000">
          <button onclick="clearImage()" style="position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.7);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <textarea class="prompt-input" id="promptInput" placeholder="粘贴一个网址，或者告诉我你想要什么风格的设计系统..." rows="2"></textarea>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
        <div class="prompt-bottom">
          <button class="prompt-tool" onclick="pickFile()">

async function loadTemplate(id){
  showToast('加载中...');
  try{
    const r=await fetch('/api/templates/'+encodeURIComponent(id));
    if(!r.ok)throw new Error((await r.json()).error||'加载失败');
    const{content}=await r.json();
    document.getElementById('rawMd').value=content;
    const tpl=allTemplates.find(t=>t.id===id);
    document.getElementById('bcName').textContent=tpl?.name||id;
    const sw=TPL_SWATCHES[id]||['#7C5CFC'];
    document.getElementById('bcDot').style.background=sw[0];
    currentDesign=parseDesignMd(content);
    renderEditor();
    showView('editor');
    showToast((tpl?.name||id)+' 已加载');
  }catch(e){showToast('错误: '+e.message)}
}

function parseDesignMd(md){
  const sections=[];let cur=null;
  for(const line of md.split('\n')){
    const h2=line.match(/^##\s+(\d+)\.\s+(.+)/);
    if(h2){if(cur)sections.push(cur);cur={num:parseInt(h2[1]),title:h2[2].trim(),lines:[],items:[],tables:[],dos:[],donts:[]};continue}
    if(!cur)continue;
    cur.lines.push(line);
    const boldItem=line.match(/^-\s+\*\*(.+?)\*\*\s*\(`([^`]+)`\):\s*(.*)/);
    if(boldItem)cur.items.push({name:boldItem[1],value:boldItem[2],desc:boldItem[3]});
    const simpleItem=line.match(/^-\s+(.+?):\s*`?([^`\n]+?)`?\s*$/);
    if(simpleItem&&!boldItem)cur.items.push({name:simpleItem[1].replace(/\*\*/g,''),value:simpleItem[2]});
    const tableRow=line.match(/^\|(.+)\|$/);
    if(tableRow&&!line.includes('---'))cur.tables.push(tableRow[1].split('|').map(c=>c.trim()));
    if(line.startsWith('- ')&&cur.num===7){
      const lastH3=cur.lines.filter(l=>l.startsWith('### ')).pop()||'';
      if(lastH3.includes("Don't")||lastH3.includes("don't")||lastH3.includes('避免'))cur.donts.push(line.slice(2).replace(/^\*\*/,'').replace(/\*\*/g,''));
      else if(lastH3.includes('Do ')||lastH3==='### Do'||lastH3.includes('推荐'))cur.dos.push(line.slice(2).replace(/^\*\*/,'').replace(/\*\*/g,''));
    }
  }
  if(cur)sections.push(cur);return sections;
}

function renderEditor(){
  const inner=document.getElementById('canvasInner');
  if(!currentDesign||!currentDesign.length){
    inner.innerHTML='<div class="empty-state"><p>暂无数据</p></div>';
    return;
  }
  inner.innerHTML='';
  for(const sec of currentDesign){
    const meta=SEC_META[sec.num];
    if(!meta)continue;
    const card=document.createElement('div');
    card.className='sec-card';
    card.dataset.sec=sec.num;
    card.innerHTML=`<div class="sec-header"><div class="sec-dot" style="background:${meta.color}"></div><div class="sec-title">${meta.zh}</div><div class="sec-header-spacer"></div><div class="sec-edit"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></div></div>${renderSectionContent(sec)}`;
    inner.appendChild(card);
  }
}

function renderSectionContent(sec){
  switch(sec.num){
    case 1:return renderTheme(sec);
    case 2:return renderColors(sec);
    case 3:return renderTypo(sec);
    case 4:return renderComponents(sec);
    case 5:return renderLayout(sec);
    case 6:return renderDepth(sec);
    case 7:return renderDosDonts(sec);
    case 8:return renderResponsive(sec);
    case 9:return renderAgentGuide(sec);
    default:return '';
  }
}

function renderTheme(sec){
  const desc=sec.lines.filter(l=>l.length>20&&!l.startsWith('-')&&!l.startsWith('**')&&!l.startsWith('#')).slice(0,1).join(' ').substring(0,180);
  const kws=[...new Set((desc.match(/dark|light|minimal|premium|fintech|bold|clean|geometric|luxury|modern/gi)||[]).map(k=>k.toLowerCase()))].slice(0,3);
  const tagsHtml=kws.length?`<div class="sec-tags">${kws.map(k=>`<span class="sec-tag">${k}</span>`).join('')}</div>`:'';
  return `<div class="sec-desc">${desc||'暂无描述'}</div>${tagsHtml}`;
}

function renderColors(sec){
  const colors=sec.items.filter(i=>i.value&&i.value.match(/^#[0-9a-fA-F]{3,8}/)).slice(0,5);
  if(!colors.length)return '<div class="sec-desc">暂无颜色</div>';
  return `<div class="swatch-header"><span></span><span class="swatch-add">+ 添加</span></div><div class="swatch-grid">${colors.map(c=>`<div class="swatch-item"><div class="swatch-color ${isColorLight(c.value)?'light':''}" style="background:${c.value}" title="${c.value}"></div><span class="swatch-name">${c.name}</span></div>`).join('')}</div>`;
}

function renderTypo(sec){
  const fonts=sec.items.filter(i=>['Primary','Secondary','Monospace','主字体','副字体','等宽'].some(k=>i.name.includes(k)));
  const primary=(fonts[0]?.value||'Inter').split(',')[0].trim().replace(/`/g,'');
  return `<div class="typo-sample"><div style="font-family:'${primary}',sans-serif;font-size:26px;font-weight:300;color:var(--text);letter-spacing:-0.6px">展示标题</div><span class="typo-meta">${primary} · 56px · weight 300</span></div><div class="typo-sample"><div style="font-family:'${primary}',sans-serif;font-size:18px;font-weight:300;color:var(--text2)">章节标题</div><span class="typo-meta">${primary} · 32px · weight 300</span></div><div class="typo-sample"><div style="font-family:'${primary}',sans-serif;font-size:13px;font-weight:300;color:var(--text3)">正文，轻盈且自信。</div><span class="typo-meta">${primary} · 16px</span></div>`;
}

function renderComponents(sec){
  const subs=[];let cur=null;
  sec.lines.forEach(l=>{
    const h3=l.match(/^###\s+(.+)/);
    if(h3){if(cur)subs.push(cur);cur={name:h3[1],props:[]};return}
    if(cur){const p=l.match(/^-\s+(.+?):\s*(.+)/);if(p)cur.props.push({k:p[1].replace(/\*\*/g,''),v:p[2]})}
  });
  if(cur)subs.push(cur);
  const btnSec=subs.find(s=>s.name.match(/button|按钮/i));
  let html='';
  if(btnSec){
    const bg=btnSec.props.find(p=>p.k.match(/background|背景/i))?.v?.match(/#[0-9a-fA-F]+/)?.[0]||'#7C5CFC';
    const radius=(btnSec.props.find(p=>p.k.match(/radius|圆角/i))?.v||'4px').replace(/`/g,'');
    html+=`<div class="comp-btns"><div class="comp-btn-primary" style="background:${bg};border-radius:${radius}">立即开始</div><div class="comp-btn-ghost" style="border:1px solid ${bg};color:${bg};border-radius:${radius}">联系销售</div></div>`;
  }
  const cardSec=subs.find(s=>s.name.match(/card|卡片|container/i));
  if(cardSec){
    html+=`<div class="comp-card-preview"><div class="ct">功能卡片</div><div class="cd">${cardSec.props.slice(0,2).map(p=>p.v.substring(0,30)).join(' · ')}</div></div>`;
  }
  return html||'<div class="sec-desc">暂无组件</div>';
}

function renderLayout(sec){
  let html='';
  const scaleLine=sec.lines.find(l=>l.match(/scale|刻度/i));
  const baseLine=sec.lines.find(l=>l.match(/base unit|基础单位/i));
  if(baseLine){
    html+=`<div style="font-size:11px;color:var(--text3)">${baseLine.replace(/^-\s+/,'').replace(/\*\*/g,'')}</div>`;
  }
  const vals=[];
  if(scaleLine){
    const nums=scaleLine.match(/\d+/g);
    if(nums)nums.forEach(n=>{const v=parseInt(n);if(v>=4&&v<=48)vals.push(v)});
  }
  if(vals.length){
    html+=`<div class="spacing-row">${[...new Set(vals)].sort((a,b)=>a-b).slice(0,5).map(v=>`<div class="sp-item"><div class="sp-box" style="width:${v}px;height:${v}px"></div><span class="sp-label">${v}</span></div>`).join('')}</div>`;
  }
  return html||'<div class="sec-desc">暂无布局数据</div>';
}

function renderDepth(sec){
  const table=sec.tables.filter(r=>r.length>=3&&!r[0].match(/level|级别/i));
  if(table.length){
    return `<div class="depth-row">${table.slice(0,4).map(r=>{
      const shadow=r[1]?.match(/`([^`]+)`/)?.[1]||'';
      return `<div class="depth-item"><div class="depth-box" style="${shadow?'box-shadow:'+shadow:''}"></div><span class="depth-label">${(r[0]||'').substring(0,6)}</span></div>`;
    }).join('')}</div>`;
  }
  return `<div class="depth-row"><div class="depth-item"><div class="depth-box"></div><span class="depth-label">无</span></div><div class="depth-item"><div class="depth-box" style="box-shadow:0 3px 6px rgba(23,23,23,0.5)"></div><span class="depth-label">微弱</span></div><div class="depth-item"><div class="depth-box" style="box-shadow:0 8px 20px rgba(50,50,93,0.4)"></div><span class="depth-label">标准</span></div><div class="depth-item"><div class="depth-box" style="box-shadow:0 14px 35px rgba(50,50,93,0.5)"></div><span class="depth-label">悬浮</span></div></div>`;
}

function renderDosDonts(sec){
  const dos=sec.dos.slice(0,3);const donts=sec.donts.slice(0,3);
  if(!dos.length&&!donts.length)return '<div class="sec-desc">暂无规范</div>';
  return `<div class="dd-wrap">${dos.length?`<div class="dd-box dd-do"><div class="dd-title">✓ 推荐</div>${dos.map(d=>`<div>· ${d.substring(0,50)}</div>`).join('')}</div>`:''}${donts.length?`<div class="dd-box dd-dont"><div class="dd-title">✗ 避免</div>${donts.map(d=>`<div>· ${d.substring(0,50)}</div>`).join('')}</div>`:''}</div>`;
}

function renderResponsive(sec){
  const table=sec.tables.filter(r=>r.length>=3&&!r[0].match(/name|名称/i));
  const zhNames={'Mobile':'移动','Tablet':'平板','Desktop':'桌面','Large Desktop':'大屏'};
  if(table.length){
    return `<div class="resp-row">${table.slice(0,3).map(r=>{
      const zh=zhNames[r[0]]||r[0];
      return `<div class="resp-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/></svg><div class="resp-name">${zh}</div><div class="resp-size">${r[1]}</div></div>`;
    }).join('')}</div>`;
  }
  return `<div class="resp-row"><div class="resp-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/></svg><div class="resp-name">移动</div><div class="resp-size">&lt;640</div></div><div class="resp-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="3" width="16" height="18" rx="2"/></svg><div class="resp-name">平板</div><div class="resp-size">640-1024</div></div><div class="resp-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/></svg><div class="resp-name">桌面</div><div class="resp-size">&gt;1024</div></div></div>`;
}

function renderAgentGuide(sec){
  const refs=sec.items.filter(i=>i.value&&i.value.match(/#[0-9a-fA-F]/)).slice(0,4);
  const guides=sec.lines.filter(l=>l.match(/^\d+\.\s/)).slice(0,4);
  let html='';
  if(refs.length){
    html+=`<div class="agent-refs">${refs.map(r=>`<div><span style="color:var(--primary)">→</span> ${r.name}: <code>${r.value}</code></div>`).join('')}</div>`;
  }
  if(guides.length){
    html+=`<div class="agent-code">${guides.map(g=>`<div>${g}</div>`).join('')}</div>`;
  }
  return html||'<div class="sec-desc">暂无指南</div>';
}

function isColorLight(hex){
  if(!hex||!hex.startsWith('#'))return false;
  let h=hex.replace('#','');
  if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  return(r*299+g*587+b*114)/1000>200;
}

async function handleGenerate(){
  const val=document.getElementById('promptInput').value.trim();

  // 1. If image uploaded, send to Gemini Vision
  if(uploadedImage){
    const btn=document.getElementById('genBtn');
    btn.disabled=true;btn.classList.add('loading');
    showToast('Gemini 正在分析截图...');
    try{
      const r=await fetch('/api/analyze-image',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({imageBase64:uploadedImage,userPrompt:val})
      });
      if(!r.ok)throw new Error((await r.json()).error||'分析失败');
      const{content}=await r.json();
      document.getElementById('rawMd').value=content;
      document.getElementById('bcName').textContent='截图分析';
      // Extract first hex color for breadcrumb dot
      const firstHex=content.match(/#[0-9a-fA-F]{6}/)?.[0]||'#7C5CFC';
      document.getElementById('bcDot').style.background=firstHex;
      currentDesign=parseDesignMd(content);
      renderEditor();
      showView('editor');
      clearImage();
      document.getElementById('promptInput').value='';
      showToast('分析完成！');
    }catch(e){showToast('分析失败: '+e.message)}
    finally{btn.disabled=false;btn.classList.remove('loading')}
    return;
  }

  // 2. If URL, extract
  if(!val){showToast('请输入网址或上传截图');return}
  if(val.match(/^https?:\/\//i)||val.match(/^[\w-]+\.[\w-]+/)){
    const url=val.match(/^https?:\/\//i)?val:'https://'+val;
    extractFromUrl(url);
  }else{
    showToast('请粘贴网址，或去模版库选择');
    showView('gallery');
  }
}

async function extractFromUrl(url){
  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.classList.add('loading');
  try{
    const r=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    if(!r.ok)throw new Error((await r.json()).error);
    const data=await r.json();
    const md=generateStitchMd(data,url);
    document.getElementById('rawMd').value=md;
    const host=new URL(url).hostname.replace('www.','');
    document.getElementById('bcName').textContent=host;
    document.getElementById('bcDot').style.background=data.colors[0]?.value||'#7C5CFC';
    currentDesign=parseDesignMd(md);
    renderEditor();
    showView('editor');
    showToast('提取成功！');
  }catch(e){showToast('错误: '+e.message)}
  finally{btn.disabled=false;btn.classList.remove('loading')}
}

function generateStitchMd(data,url){
  const host=new URL(url).hostname.replace('www.','');
  const pf=data.fonts[0]?.name||'System';
  const L=[];
  L.push(`# Design System Inspiration of ${data.title||host}\n`);
  L.push(`## 1. Visual Theme & Atmosphere\n`);
  L.push(`The visual identity of ${host} is built on a ${isColorLight(data.colors[0]?.value||'#fff')?'light':'dark'} foundation with ${pf} as the primary typeface.\n`);
  L.push(`## 2. Color Palette & Roles\n\n### Primary`);
  const roles=['Background','Surface','Text Primary','Text Secondary','Primary','Secondary','Accent','Border'];
  data.colors.slice(0,8).forEach((c,i)=>L.push(`- **${roles[i]||'Color-'+(i+1)}** (\`${c.value}\`): Interface color`));
  L.push(`\n## 3. Typography Rules\n\n### Font Family`);
  data.fonts.forEach((f,i)=>L.push(`- **${i===0?'Primary':i===1?'Secondary':'Monospace'}**: ${f.name}`));
  L.push(`\n## 4. Component Stylings\n\n### Buttons`);
  L.push(`- Background: \`${data.colors[4]?.value||'#333'}\``);
  L.push(`- Radius: ${data.borderRadii[0]||'4px'}`);
  L.push(`\n## 5. Layout Principles\n\n### Spacing System`);
  L.push(`- Base unit: ${data.spacings[1]||8}px`);
  L.push(`- Scale: ${data.spacings.join('px, ')}px`);
  L.push(`\n## 6. Depth & Elevation\n\n| Level | Treatment | Use |`);
  L.push(`|-------|-----------|-----|`);
  L.push(`| Flat | No shadow | Background |`);
  data.shadows.slice(0,3).forEach((s,i)=>L.push(`| Level ${i+1} | \`${s.substring(0,50)}\` | Elevated |`));
  L.push(`\n## 7. Do's and Don'ts\n\n### Do`);
  L.push(`- Use ${pf} consistently`);
  L.push(`- Keep colors within palette`);
  L.push(`\n### Don't`);
  L.push(`- Don't mix font families`);
  L.push(`- Don't use colors outside palette`);
  L.push(`\n## 8. Responsive Behavior\n\n### Breakpoints\n| Name | Width | Key Changes |`);
  L.push(`|------|-------|-------------|`);
  L.push(`| Mobile | <640px | Single column |`);
  L.push(`| Tablet | 640-1024px | 2-column |`);
  L.push(`| Desktop | >1024px | Full layout |`);
  L.push(`\n## 9. Agent Prompt Guide\n\n### Quick Color Reference`);
  data.colors.slice(0,4).forEach((c,i)=>L.push(`- ${roles[i]}: \`${c.value}\``));
  L.push(`\n### Iteration Guide`);
  L.push(`1. Use ${pf} for all text`);
  L.push(`2. Primary color: \`${data.colors[4]?.value||data.colors[0]?.value}\``);
  return L.join('\n');
}

// Analyze image — extract dominant colors via Canvas pixel sampling
async function analyzeImage(dataUrl){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxSize=300;
      const scale=Math.min(maxSize/img.width,maxSize/img.height,1);
      canvas.width=img.width*scale;
      canvas.height=img.height*scale;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height).data;

      // Detect pure-black/pure-white borders and crop them (ignore edges that are uniform)
      const w=canvas.width,h=canvas.height;
      const isEdgePixel=(x,y)=>{
        const idx=(y*w+x)*4;
        const r=imageData[idx],g=imageData[idx+1],b=imageData[idx+2];
        // Near-pure black or pure white — likely padding/letterboxing
        return (r<10&&g<10&&b<10)||(r>245&&g>245&&b>245);
      };
      // Find content bounds (skip edge letterboxing)
      let minX=0,maxX=w-1,minY=0,maxY=h-1;
      for(let x=0;x<w/2;x++){let hit=false;for(let y=0;y<h;y++){if(!isEdgePixel(x,y)){hit=true;break}}if(hit){minX=x;break}}
      for(let x=w-1;x>w/2;x--){let hit=false;for(let y=0;y<h;y++){if(!isEdgePixel(x,y)){hit=true;break}}if(hit){maxX=x;break}}
      for(let y=0;y<h/2;y++){let hit=false;for(let x=minX;x<=maxX;x++){if(!isEdgePixel(x,y)){hit=true;break}}if(hit){minY=y;break}}
      for(let y=h-1;y>h/2;y--){let hit=false;for(let x=minX;x<=maxX;x++){if(!isEdgePixel(x,y)){hit=true;break}}if(hit){maxY=y;break}}

      // Bucket colors into groups (quantize to reduce noise, clamp to 255 to avoid #100 bug)
      const buckets=new Map();
      for(let y=minY;y<=maxY;y++){
        for(let x=minX;x<=maxX;x++){
          const i=(y*w+x)*4;
          const a=imageData[i+3];
          if(a<200)continue;
          // Quantize to 16 levels using floor (keeps values in 0-240 range, always valid hex)
          const r=Math.floor(imageData[i]/16)*16;
          const g=Math.floor(imageData[i+1]/16)*16;
          const b=Math.floor(imageData[i+2]/16)*16;
          const key=`${r},${g},${b}`;
          buckets.set(key,(buckets.get(key)||0)+1);
        }
      }

      // Sort by frequency
      const sorted=[...buckets.entries()].sort((a,b)=>b[1]-a[1]);
      const totalPixels=sorted.reduce((s,[,c])=>s+c,0);

      // Pick diverse colors (skip too-similar ones)
      const picked=[];
      const MIN_DIST=45;
      for(const [key,count] of sorted){
        const [r,g,b]=key.split(',').map(Number);
        const tooClose=picked.some(p=>{
          const dr=p.r-r,dg=p.g-g,db=p.b-b;
          return Math.sqrt(dr*dr+dg*dg+db*db)<MIN_DIST;
        });
        if(!tooClose){
          picked.push({r,g,b,count,ratio:count/totalPixels});
          if(picked.length>=15)break;
        }
      }

      // Determine overall brightness: average luminance weighted by pixel count
      let totalLum=0;
      picked.forEach(c=>{
        const lum=(c.r*299+c.g*587+c.b*114)/1000;
        totalLum+=lum*c.ratio;
      });
      const isDark=totalLum<128;

      // Background = the most frequent color that matches the overall brightness direction
      // (avoids picking a colored element as background)
      const bgCandidates=picked.filter(c=>{
        const lum=(c.r*299+c.g*587+c.b*114)/1000;
        return isDark?lum<80:lum>180;
      });
      const bgColor=bgCandidates[0]||picked[0];

      const toHex=(c)=>'#'+[c.r,c.g,c.b].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();

      // Score colors by (saturation * log(count)) so dominant saturated color wins,
      // but tiny accent splashes don't become "primary"
      const scored=picked.map(c=>{
        const max=Math.max(c.r,c.g,c.b);
        const min=Math.min(c.r,c.g,c.b);
        const sat=max===0?0:(max-min)/max;
        const lum=(c.r*299+c.g*587+c.b*114)/1000;
        // Brand colors are usually mid-luminance, saturated
        const midness=1-Math.abs(lum-128)/128;
        const score=sat*Math.log(1+c.count)*midness;
        return{...c,sat,lum,score};
      });

      // Sort candidates for primary: most saturated + reasonably frequent
      const brandCandidates=scored.filter(c=>c.sat>0.3&&c.ratio>0.005).sort((a,b)=>b.score-a.score);
      const primary=brandCandidates[0]||scored.sort((a,b)=>b.sat-a.sat)[0]||picked[1]||bgColor;

      // Neutrals = low saturation colors, used for surfaces/borders/text
      const neutrals=scored.filter(c=>c.sat<=0.3).sort((a,b)=>b.count-a.count);

      // Surface = a neutral that's close to but slightly different from bg
      const surface=neutrals.find(c=>{
        const dr=c.r-bgColor.r,dg=c.g-bgColor.g,db=c.b-bgColor.b;
        const dist=Math.sqrt(dr*dr+dg*dg+db*db);
        return dist>10&&dist<80;
      })||neutrals[1]||bgColor;

      // Text = extremes (darkest for light bg, lightest for dark bg)
      const textCol=isDark
        ?neutrals.sort((a,b)=>b.lum-a.lum)[0]||{r:255,g:255,b:255}
        :neutrals.sort((a,b)=>a.lum-b.lum)[0]||{r:17,g:17,b:17};
      const textSecondary=isDark
        ?neutrals.filter(c=>c.lum>100&&c.lum<200)[0]||{r:161,g:161,b:170}
        :neutrals.filter(c=>c.lum>80&&c.lum<180)[0]||{r:113,g:113,b:122};

      // Accent = second most salient brand color
      const accent=brandCandidates[1]||brandCandidates[0]||primary;
      const secondary=brandCandidates[2]||brandCandidates[1]||accent;

      // Border = light neutral
      const borderCol=neutrals.find(c=>{
        const lumDiff=Math.abs(c.lum-(isDark?40:230));
        return lumDiff<30;
      })||neutrals[2]||{r:200,g:200,b:200};

      resolve({
        background:toHex(bgColor),
        isDark,
        primary:toHex(primary),
        secondary:toHex(secondary),
        surface:toHex(surface),
        text:toHex(textCol),
        textSecondary:toHex(textSecondary),
        accent:toHex(accent),
        border:toHex(borderCol),
        muted:toHex(textSecondary),
        allColors:picked.slice(0,8).map(c=>({value:toHex(c),count:c.count}))
      });
    };
    img.src=dataUrl;
  });
}

function generateMdFromImage(analysis,userPrompt){

  L.push(`- ${isDark?'Dark':'Light'}-mode first design with ${analysis.background} as canvas`);

  L.push(`| Name | Width | Key Changes |`);
  L.push(`|------|-------|-------------|`);
  L.push(`| Mobile | <640px | Single column, stacked cards |`);
  L.push(`| Tablet | 640-1024px | 2-column grids |`);
  L.push(`| Desktop | >1024px | Full layout |`);
  L.push('');

  L.push(`## 9. Agent Prompt Guide\n\n### Quick Color Reference`);
  L.push(`- Background: \`${analysis.background}\``);
  L.push(`- Surface: \`${analysis.surface}\``);
  L.push(`- Primary: \`${analysis.primary}\``);
  L.push(`- Text: \`${analysis.text}\``);
  L.push(`- Accent: \`${analysis.accent}\``);
  L.push(`\n### Iteration Guide`);
  L.push(`1. Start with \`${analysis.background}\` as canvas, overlay \`${analysis.surface}\` cards`);
  L.push(`2. Use \`${analysis.primary}\` for primary CTAs and brand moments`);
  L.push(`3. Text should use \`${analysis.text}\` for main, \`${analysis.textSecondary}\` for secondary`);
  L.push(`4. Border radius 8-12px for cards and buttons`);
  L.push(`5. Mood: ${moodWords}`);

  return L.join('\n');
}

function focusUrl(){document.getElementById('promptInput').focus();document.getElementById('promptInput').placeholder='粘贴网址，例如: https://stripe.com'}
function toggleMic(){showToast('语音功能开发中')}

document.getElementById('chatInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){executeCommand(e.target.value.trim());e.target.value=''}
});

function executeCommand(cmd){
  if(!cmd)return;
  let md=document.getElementById('rawMd').value;
  const colorChange=cmd.match(/(?:把|change|set|改)\s*(\S+?)\s*(?:改成|改为|to|变成)\s*(#[0-9a-fA-F]{3,8}|\S+)/i);
  if(colorChange){
    const[,name,color]=colorChange;const hex=namedToHex(color);
    const re1=new RegExp(`(\\*\\*${name}\\*\\*\\s*\\()\`[^)]+\`(\\))`,'i');
    const re2=new RegExp(`(- ${name}:)\\s*\`?#[0-9a-fA-F]{3,8}\`?`,'i');
    if(re1.test(md))md=md.replace(re1,`$1\`${hex}\`$2`);
    else if(re2.test(md))md=md.replace(re2,`$1 \`${hex}\``);
    else{showToast('未找到: '+name);return}
    document.getElementById('rawMd').value=md;
    currentDesign=parseDesignMd(md);
    renderEditor();
    showToast(`已更新 ${name} → ${hex}`);
    return;
  }
  showToast('试试: "把Primary改成#FF0000"');
}

function namedToHex(c){
  if(c.startsWith('#'))return c.toUpperCase();
  return{红:'#FF0000',蓝:'#0066FF',绿:'#00CC66',黑:'#000000',白:'#FFFFFF',橙:'#FF8800',紫:'#7C5CFC',粉:'#FF66AA',黄:'#FFCC00',青:'#00CCFF',灰:'#888888',深蓝:'#003366',浅蓝:'#66CCFF',red:'#FF0000',blue:'#0066FF',green:'#00CC66',black:'#000000',white:'#FFFFFF'}[c]||c;
}

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

loadTemplates();

document.getElementById('promptInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleGenerate()}
});

// Drag-and-drop for screenshots
const promptBox=document.querySelector('.prompt-box');
if(promptBox){
  ['dragenter','dragover','dragleave','drop'].forEach(ev=>{
    promptBox.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation()});
  });
  promptBox.addEventListener('dragover',()=>{
    promptBox.style.borderColor='var(--primary)';
  });
  promptBox.addEventListener('dragleave',()=>{
    promptBox.style.borderColor='';
  });
  promptBox.addEventListener('drop',e=>{
    promptBox.style.borderColor='';
    const file=e.dataTransfer.files[0];
    if(file&&file.type.startsWith('image/')){
      handleFile({target:{files:[file]}});
    }
  });
}

// Paste screenshot from clipboard
document.addEventListener('paste',e=>{
  if(document.getElementById('homeView').classList.contains('active')){
    const items=e.clipboardData?.items;
    if(!items)return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        const file=item.getAsFile();
        if(file)handleFile({target:{files:[file]}});
        break;
      }
    }
  }
});
